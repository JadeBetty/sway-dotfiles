[window.padding]
x = 20
y = 20

[window]
opacity = 0.8
decorations = "full"
dynamic_title = true

[font]
size = 14.0

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[colors.primary]
background = '#1e1e2e'
foreground = '#cdd6f4'
dim_foreground = '#7f849c'
bright_foreground = '#cdd6f4'

[colors.cursor]
text = '#1e1e2e'
cursor = '#f5e0dc'

[colors.vi_mode_cursor]
text = '#1e1e2e'
cursor = '#b4befe'

[colors.selection]
text = '#1e1e2e'
background = '#f5e0dc'

[colors.normal]
black   = '#45475a'
red     = '#f38ba8'
green   = '#a6e3a1'
yellow  = '#f9e2af'
blue    = '#89b4fa'
magenta = '#cba6f7'
cyan    = '#89dceb'
white   = '#bac2de'

[colors.bright]
black   = '#585b70'
red     = '#f38ba8'
green   = '#a6e3a1'
yellow  = '#f9e2af'
blue    = '#89b4fa'
magenta = '#cba6f7'
cyan    = '#89dceb'
white   = '#a6adc8'

[colors.dim]
black   = '#45475a'
red     = '#f38ba8'
green   = '#a6e3a1'
yellow  = '#f9e2af'
blue    = '#89b4fa'
magenta = '#cba6f7'
cyan    = '#89dceb'
white   = '#bac2de'

[colors.hints.start]
foreground = '#1e1e2e'
background = '#f9e2af'

[colors.hints.end]
foreground = '#1e1e2e'
background = '#a6adc8'

[cursor]
style = "Block"
unfocused_hollow = true

[scrolling]
history = 10000
multiplier = 3
